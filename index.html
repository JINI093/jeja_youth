<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제자교회 청년부 4월 26일 순 공과</title>
    <style>
        body {
            background-color: #f3e5f5;
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 85%;
            min-height: 480px;
            display: flex;
            flex-direction: column;
        }
        h1 { color: #7b1fa2; font-size: 1.4rem; margin-bottom: 0.5rem; line-height: 1.4; }
        .subtitle { color: #ab47bc; font-size: 0.95rem; margin-bottom: 1.5rem; font-weight: bold; }
        
        .menu-group { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; justify-content: center; }
        .btn {
            padding: 20px;
            border: none;
            border-radius: 15px;
            background-color: #f3e5f5;
            color: #4a148c;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        #slide-container { display: none; flex-direction: column; height: 100%; text-align: left; }
        #slides { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .slide-header { display: flex; align-items: center; gap: 8px; margin-bottom: 15px; border-bottom: 2px solid #f3e5f5; padding-bottom: 10px; }
        .slide-step { background: #7b1fa2; color: white; padding: 3px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }
        .slide-title { color: #7b1fa2; font-size: 1.2rem; font-weight: bold; }
        
        .verse-box { background: #fffde7; border: 1px dashed #fbc02d; padding: 15px; margin-bottom: 20px; font-size: 0.9rem; color: #5d4037; line-height: 1.6; border-radius: 12px; }
        .content-text { font-size: 1rem; line-height: 1.8; color: #333; margin-bottom: 20px; }
        .desc-text { font-size: 1.1rem; font-weight: bold; color: #4a148c; background: #fdf7ff; padding: 15px; border-radius: 10px; line-height: 1.6; }
        
        .controls { margin-top: auto; display: flex; flex-direction: column; gap: 10px; padding-top: 20px; }
        .nav-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .nav-btn { flex: 1; padding: 15px; border: none; border-radius: 10px; background: #f5f5f5; font-weight: bold; cursor: pointer; color: #666; }
        .next-btn { background: #e1bee7; color: #4a148c; }
        .home-btn { width: 100%; padding: 12px; background: #7b1fa2; color: white; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="main-menu">
        <h1>💎 4월 26일 순 공과</h1>
        <div class="subtitle">정체성을 세우시는 하나님</div>
        <div class="verse-box">
            "너희가 내 말을 잘 듣고 내 언약을 지키면 너희는 모든 민족 중에서 내 소유(세굴라)가 되겠고" (출 19:5)
        </div>
        <div class="menu-group">
            <button class="btn" onclick="startSlide()">💬 나눔 질문 시작하기</button>
        </div>
    </div>

    <div id="slide-container">
        <div id="slides"></div>
        <div class="controls">
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">이전</button>
                <span id="page-num" style="font-size: 0.9rem; color: #888;"></span>
                <button class="nav-btn next-btn" id="nextBtn" onclick="changeSlide(1)">다음</button>
            </div>
            <button class="home-btn" onclick="goHome()">🏠 처음으로</button>
        </div>
    </div>
</div>

<script>
    let currentSlide = 0;
    const questions = [
        {
            step: "마음 열기",
            title: "Q1. 나만의 보물 1호는?",
            text: "거창한 게 아니어도 괜찮아요! 내가 요즘 가장 아끼는 물건이나 취미, 혹은 보고만 있어도 힐링 되는 존재가 있다면 소개해 주세요.",
            desc: "그 존재가 나에게 주는 위로와 기쁨은 무엇인가요?"
        },
        {
            step: "말씀 되새기기",
            title: "Q2. 보물(세굴라)의 기준",
            text: "세상은 보통 나의 쓸모나 스펙을 보고 가치를 매깁니다. 하지만 하나님이 나를 보물로 여기시는 기준은 세상과 전혀 다릅니다.",
            desc: "하나님이 나를 보물로 여기시는 기준은 세상과 어떻게 다른지 함께 나누어 봐요."
        },
        {
            step: "삶으로 살기",
            title: "Q3. 꼬리표 떼어내기",
            text: "직장에서의 비교나 미래에 대한 불안함 때문에 기가 죽을 때가 있죠. 하지만 우리는 하나님의 특별한 소유입니다.",
            desc: "이번 주, 세상이 붙인 '꼬리표'를 떼어버리고 당당해지고 싶은 구체적인 상황은 언제인가요?"
        }
    ];

    function startSlide() {
        currentSlide = 0;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('slide-container').style.display = 'flex';
        renderSlide();
    }

    function renderSlide() {
        const slidesDiv = document.getElementById('slides');
        const q = questions[currentSlide];
        
        slidesDiv.innerHTML = `
            <div style="animation: fadeIn 0.4s">
                <div class="slide-header">
                    <span class="slide-step">${q.step}</span>
                    <span class="slide-title">${q.title}</span>
                </div>
                <div class="content-text">${q.text}</div>
                <div class="desc-text">${q.desc}</div>
            </div>
        `;
        
        document.getElementById('page-num').innerText = `${currentSlide + 1} / ${questions.length}`;
        document.getElementById('prevBtn').style.visibility = currentSlide === 0 ? 'hidden' : 'visible';
        document.getElementById('nextBtn').innerText = currentSlide === questions.length - 1 ? '마침' : '다음';
    }

    function changeSlide(direction) {
        currentSlide += direction;
        if (currentSlide >= questions.length) goHome();
        else if (currentSlide < 0) currentSlide = 0;
        else renderSlide();
    }

    function goHome() {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('slide-container').style.display = 'none';
    }
</script>

</body>
</html>
