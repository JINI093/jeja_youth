<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제자교회 청년부 순 공과</title>
    <style>
        body {
            background-color: #e3f2fd;
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 85%;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }
        h1 { color: #1976d2; font-size: 1.3rem; margin-bottom: 1.5rem; line-height: 1.4; }
        
        .menu-group { display: flex; flex-direction: column; gap: 12px; flex-grow: 1; justify-content: center; }
        .btn {
            padding: 18px;
            border: none;
            border-radius: 12px;
            background-color: #bbdefb;
            color: #0d47a1;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        #slide-container { display: none; flex-direction: column; height: 100%; text-align: left; }
        #slides { flex-grow: 1; overflow-y: auto; }
        .slide-title { color: #1976d2; border-bottom: 2px solid #e3f2fd; padding-bottom: 10px; font-size: 1.15rem; font-weight: bold; margin-bottom: 15px; }
        .content { font-size: 1rem; line-height: 1.7; color: #333; }
        
        .point-box { background: #f8fbff; border-left: 4px solid #64b5f6; padding: 10px; margin: 10px 0; font-size: 0.95rem; }
        .highlight { color: #1976d2; font-weight: bold; }
        .important { color: #d32f2f; font-weight: bold; }

        .controls { margin-top: auto; display: flex; flex-direction: column; gap: 8px; padding-top: 15px; }
        .nav-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .nav-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #f0f0f0; font-weight: bold; cursor: pointer; }
        .next-btn { background: #90caf9; color: #0d47a1; }
        .home-btn { width: 100%; padding: 10px; background: #1976d2; color: white; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="main-menu">
        <h1>🌱 제자교회 청년부<br>2월 1일 순 공과</h1>
        <div class="menu-group">
            <button class="btn" onclick="startSlide('summary')">📝 핵심 메시지 정리</button>
            <button class="btn" onclick="startSlide('study')">💬 순원 나눔 질문</button>
        </div>
    </div>

    <div id="slide-container">
        <div id="slides"></div>
        <div class="controls">
            <div class="nav-row">
                <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">이전</button>
                <span id="page-num" style="font-size: 0.85rem; color: #888;"></span>
                <button class="nav-btn next-btn" id="nextBtn" onclick="changeSlide(1)">다음</button>
            </div>
            <button class="home-btn" onclick="goHome()">🏠 메인으로</button>
        </div>
    </div>
</div>

<script>
    let currentSlide = 0;
    let currentData = [];

    const data = {
        summary: [
            {
                title: "① '다시 시작'을 허락하시는 분",
                text: "<div class='content'>홍수는 심판이었지만, 동시에 새 출발의 문이었습니다.<br>노아 이후의 세계는 '깨끗한 세계'가 아니라<br><span class='highlight'>👉 은혜 위에 세워진 세계</span>입니다.</div><div class='point-box'>📖 창 6:8<br>“그러나 노아는 여호와께 은혜를 입었더라”<br>➡ 다시 시작은 능력의 결과가 아니라 은혜의 선물입니다.</div>"
            },
            {
                title: "② '회복된 명령' (창 9:1)",
                text: "<div class='content'>“생육하고 번성하여 땅에 충만하라”<br>타락 전 아담에게 주셨던 하나님 나라의 사명을<br><span class='highlight'>👉 노아에게 다시 맡기십니다.</span><br><br>➡ 하나님은 실패 후에도 사명을 거두지 않으시는 신실한 분입니다.</div>"
            },
            {
                title: "③ '청지기 의식'으로의 부르심",
                text: "<div class='content'>“정복하고 다스리라”는 말은<br>❌ 내 마음대로 사용하라는 뜻이 아닙니다.<br><span class='important'>⭕ 하나님 대신 관리하라는 뜻입니다.</span><br><br>생명에 대한 존중은 하나님 나라의 가치입니다.<br>➡ 내 인생이 아니라 <b>하나님께 맡겨진 삶</b>입니다.</div>"
            },
            {
                title: "④ '하나님 나라'로 이어지는 순종",
                text: "<div class='content'>노아의 순종 하나로 한 가정, 한 공동체, 한 시대가 새로 시작되었습니다.<br><br>➡ 하나님은 언제나 <span class='highlight'>한 사람의 순종</span>을 통해 그 나라를 회복해 가십니다.</div>"
            }
        ],
        study: [
            {
                title: "질문 1. 오늘의 단어",
                text: "<p class='content'>오늘 말씀 중 가장 인상 깊은 구절 혹은 단어는 무엇인가요?</p>"
            },
            {
                title: "질문 2. 다시 시작하는 삶",
                text: "<p class='content'>최근 내 삶에서 “다시 시작하고 싶다”고 느꼈던 순간은 언제였나요?</p><p class='point-box'>2-1. 그 상황 속에서 하나님을 주인으로 인정하지 못했던 부분은 무엇이었나요?</p>"
            },
            {
                title: "질문 3. 순종의 한 걸음",
                text: "<p class='content'>하나님 나라의 회복을 위해 순종으로 내딛고 싶은 <b>작은 한 걸음</b>은 무엇인가요?</p>"
            }
        ]
    };

    function startSlide(type) {
        currentData = data[type];
        currentSlide = 0;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('slide-container').style.display = 'flex';
        renderSlide();
    }

    function renderSlide() {
        const slidesDiv = document.getElementById('slides');
        const slide = currentData[currentSlide];
        slidesDiv.innerHTML = `<div style="animation: fadeIn 0.4s"><div class="slide-title">${slide.title}</div><div class="content">${slide.text}</div></div>`;
        document.getElementById('page-num').innerText = `${currentSlide + 1} / ${currentData.length}`;
        document.getElementById('prevBtn').style.visibility = currentSlide === 0 ? 'hidden' : 'visible';
        document.getElementById('nextBtn').innerText = currentSlide === currentData.length - 1 ? '완료' : '다음';
    }

    function changeSlide(direction) {
        currentSlide += direction;
        if (currentSlide >= currentData.length) goHome();
        else if (currentSlide < 0) currentSlide = 0;
        else renderSlide();
    }

    function goHome() {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('slide-container').style.display = 'none';
    }
</script>

</body>
</html>
